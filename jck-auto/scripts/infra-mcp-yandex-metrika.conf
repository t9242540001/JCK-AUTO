# nginx snippet — Yandex Metrika MCP HTTPS endpoint for Claude.ai Custom Connector
#
# This file is the source of truth. Manual deploy on VDS:
#   sudo cp /var/www/jckauto/app/jck-auto/scripts/infra-mcp-yandex-metrika.conf /etc/nginx/snippets/mcp-yandex-metrika.conf
#   # then add `include /etc/nginx/snippets/mcp-yandex-metrika.conf;` to /etc/nginx/sites-enabled/jckauto inside the listen-443 server block
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Allow list = Anthropic Cloud IP ranges (Custom Connector traffic).
# Same ranges as existing mcp-gateway.conf — verified live in mcp-gateway-out.log.
#
# nginx longest-prefix-match: this `/mcp/metrika` location wins over the
# existing `/mcp` location (mcp-gateway.conf) for any request path under
# /mcp/metrika/*. The existing /mcp continues to serve mcp-gateway for
# /mcp without subpath.
#
# Upstream: PM2 process `yandex-metrika-mcp` listening on 127.0.0.1:8765
# (Streamable HTTP transport via supergateway wrapping atomkraft-mcp).

location /mcp/metrika {
    allow 160.79.104.0/21;
    allow 2607:6bc0::/48;
    deny all;
    proxy_pass http://localhost:8765/mcp;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 86400s;
    chunked_transfer_encoding on;
    add_header X-Robots-Tag "noindex, nofollow" always;
    access_log /var/log/nginx/mcp-yandex-metrika.access.log;
}
