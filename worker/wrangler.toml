# Wrangler configuration for the tg-proxy Cloudflare Worker.
# Deployed via .github/workflows/deploy-worker.yml using
# cloudflare/wrangler-action@v3 with API token from GitHub Secrets.
#
# Single source of truth for Worker configuration. Changes in
# Cloudflare Dashboard are overwritten on next `wrangler deploy`.
#
# [placement] configuration:
#   mode = "smart" enables Cloudflare Smart Placement.
#   region = "gcp:europe-west1" is a Placement Hint (docs:
#     https://developers.cloudflare.com/workers/configuration/placement/)
#     that tells Smart Placement to prefer a European edge near
#     Belgium GCP, bypassing the multi-source-traffic statistics
#     requirement that otherwise defaults low-traffic workers to
#     their origin region (we have single-source traffic from
#     Moscow VDS, which defaulted to local-DME and caused 19.6s
#     outbound latency to api.telegram.org).
# See decisions.md entry [2026-04-23] (written in Prompt Infra-2
# after manual verification of this deploy).

name = "tg-proxy"
main = "tg-proxy.js"
compatibility_date = "2026-03-21"

[placement]
mode = "smart"
region = "gcp:europe-west1"
