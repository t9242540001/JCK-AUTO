name: VDS Audit (mcp-gateway lightrag) One-Shot

# One-shot read-only audit. Triggers only on changes to this workflow file
# on the audit branch. SSH-only, no modifications on VDS.
# Commits captured output back to audit-output.txt on the same branch
# so the operator can pull and read it. No commits to main.

on:
  push:
    branches: [claude/audit-mcp-gateway-lightrag]
    paths:
      - '.github/workflows/audit-vds.yml'

permissions:
  contents: write

concurrency:
  group: audit-vds-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout audit branch
        uses: actions/checkout@v4
        with:
          ref: claude/audit-mcp-gateway-lightrag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup SSH
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
          VDS_SSH_KEY: ${{ secrets.VDS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VDS_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$VDS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Run read-only audit on VDS
        env:
          VDS_HOST: ${{ secrets.VDS_HOST }}
        run: |
          ssh -o StrictHostKeyChecking=accept-new root@"$VDS_HOST" 'bash -s' > audit-output.txt 2>&1 <<'REMOTE_SCRIPT'
          set +e

          echo "==================== BLOCK 1: structure ===================="
          ls -la /opt/ai-knowledge-system/
          echo "---"
          ls -la /opt/ai-knowledge-system/server/ 2>/dev/null || echo "server/ not found"
          echo "---"
          find /opt/ai-knowledge-system/ -type f -not -path '*/.venv/*' -not -path '*/__pycache__/*' -not -path '*/.git/*' 2>/dev/null | head -100

          echo "==================== BLOCK 2: git ===================="
          ( cd /opt/ai-knowledge-system && git status 2>&1 | head -20 )
          echo "---"
          ( cd /opt/ai-knowledge-system && git remote -v 2>&1 | head -10 )
          echo "---"
          ( cd /opt/ai-knowledge-system && git log --oneline -10 2>&1 )

          echo "==================== BLOCK 3: entrypoint and deps ===================="
          cat /opt/ai-knowledge-system/server/start.sh 2>/dev/null || echo "start.sh not found"
          echo "---"
          find /opt/ai-knowledge-system/ -name 'pyproject.toml' -not -path '*/.venv/*' 2>/dev/null | while read f; do echo "=== $f ==="; cat "$f"; done
          echo "---"
          find /opt/ai-knowledge-system/ -name 'requirements*.txt' -not -path '*/.venv/*' 2>/dev/null | while read f; do echo "=== $f ==="; cat "$f"; done
          echo "---"
          # .env files: print with values redacted to avoid committing secrets to repo.
          # Keys (left side) are kept so the operator can see what env vars exist.
          find /opt/ai-knowledge-system/ -name '.env*' -not -path '*/.venv/*' 2>/dev/null | while read f; do
            echo "=== $f (values redacted) ==="
            sed -E 's/^([^#=]*=).*/\1<REDACTED>/' "$f"
          done

          echo "==================== BLOCK 4: source map ===================="
          find /opt/ai-knowledge-system/ -name '*.py' -not -path '*/.venv/*' -not -path '*/__pycache__/*' 2>/dev/null | xargs wc -l 2>/dev/null

          echo "==================== BLOCK 5: lightrag/9621 mentions ===================="
          grep -rn -i 'lightrag\|9621\|query_text\|list_indexes\|get_documents\|get_document_by_id\|safe.update.protocol\|delete_single_document' /opt/ai-knowledge-system/ \
            --include='*.py' --include='*.toml' --include='*.txt' --include='*.sh' --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' \
            --exclude-dir='.venv' --exclude-dir='__pycache__' --exclude-dir='.git' 2>/dev/null

          echo "==================== BLOCK 6: MCP tool definitions ===================="
          grep -rn -B1 -A5 '@mcp\.tool\|@app\.tool\|@server\.tool\|register_tool\|FastMCP' /opt/ai-knowledge-system/ \
            --include='*.py' --exclude-dir='.venv' --exclude-dir='__pycache__' 2>/dev/null | head -250

          echo "==================== BLOCK 7: gateway in JCK-AUTO repo ===================="
          grep -A25 "mcp-gateway" /var/www/jckauto/app/jck-auto/ecosystem.config.js 2>/dev/null
          echo "---"
          grep -rn 'mcp-gateway\|FILESYSTEM_ROOTS' /var/www/jckauto/app/jck-auto/ \
            --include='*.md' --include='*.js' --include='*.ts' --include='*.json' --include='*.yml' --include='*.conf' \
            --exclude-dir='.next' --exclude-dir='.next-a' --exclude-dir='.next-b' --exclude-dir='node_modules' 2>/dev/null

          echo "==================== BLOCK 8: process and ports ===================="
          pm2 describe mcp-gateway 2>&1 | head -50
          echo "---"
          ss -tlnp 2>/dev/null | grep -E '8808|9621' || echo "no listeners on 8808/9621"
          echo "---"
          ps aux | grep -iE 'lightrag|9621' | grep -v grep || echo "no lightrag processes"
          echo "---"
          systemctl list-units --type=service --all 2>/dev/null | grep -iE 'rag|knowledge' || echo "no rag/knowledge units"

          echo "==================== AUDIT COMPLETE ===================="
          REMOTE_SCRIPT

          echo "Exit code from ssh: $?"
          echo "Output size: $(wc -c < audit-output.txt) bytes"
          head -5 audit-output.txt
          echo "..."
          tail -3 audit-output.txt

      - name: Commit audit output back to audit branch
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add audit-output.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "audit: capture VDS state for mcp-gateway lightrag review"
          # Retry push up to 4 times with exponential backoff
          for i in 1 2 3 4; do
            if git push -u origin claude/audit-mcp-gateway-lightrag; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            sleep $((2 ** i))
          done
          echo "Push failed after 4 attempts"
          exit 1
