name: Sync Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Sync catalog on VDS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: root
          key: ${{ secrets.VDS_SSH_KEY }}
          command_timeout: 10m
          envs: ANTHROPIC_API_KEY,GOOGLE_SERVICE_ACCOUNT_KEY,GOOGLE_DRIVE_FOLDER_ID
          script: |
            cd /var/www/jckauto/app/jck-auto
            echo "=== Current branch ==="
            git branch --show-current
            echo "=== Fetching all ==="
            git fetch origin
            echo "=== Checking out correct branch ==="
            git checkout claude/review-project-structure-RtYyX
            git pull
            echo "=== Installing deps ==="
            npm install
            echo "=== Installing tsx globally ==="
            npm install -g tsx tsconfig-paths
            echo "=== Verifying tsx ==="
            which tsx && tsx --version
            node -v
            echo "=== package.json sync-catalog ==="
            grep sync-catalog package.json
            echo "=== Sync starting at $(date) ==="
            npm run sync-catalog 2>&1
            SYNC_EXIT=$?
            echo "=== Sync finished at $(date) with exit code $SYNC_EXIT ==="
            exit $SYNC_EXIT
