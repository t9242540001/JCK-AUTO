name: Sync Catalog

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Sync catalog on VDS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VDS_HOST }}
          username: root
          key: ${{ secrets.VDS_SSH_KEY }}
          envs: GOOGLE_SERVICE_ACCOUNT_KEY,GOOGLE_DRIVE_FOLDER_ID,ANTHROPIC_API_KEY
          command_timeout: 20m
          script: |
            cd /var/www/jckauto/app/jck-auto
            echo "=== Current branch ==="
            git branch --show-current
            echo "=== Fetching all ==="
            git fetch origin
            echo "=== Checking out correct branch ==="
            git checkout claude/review-project-structure-RtYyX || echo "Already on branch"
            git pull
            echo "=== Installing deps ==="
            npm install
            echo "=== Installing tsx globally ==="
            npm install -g tsx tsconfig-paths
            echo "=== Verifying tsx ==="
            which tsx
            tsx --version
            echo "=== package.json sync-catalog ==="
            cat package.json | grep sync-catalog
            echo "=== Starting sync ==="
            npm run sync-catalog
