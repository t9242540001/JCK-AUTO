name: Deploy to VDS

on:
  workflow_run:
    workflows: ["Auto-merge Claude branches"]
    types: [completed]
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VDS_HOST }}
          username: root
          key: ${{ secrets.VDS_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            source /root/.bashrc 2>/dev/null || source /root/.profile 2>/dev/null || true
            cd /var/www/jckauto/app/jck-auto
            git fetch origin
            git reset --hard origin/main
            # npm 10.8.2 has a reify exit code bug in non-TTY (Actions) context:
            # it returns 1 even after successful install when many platform-specific
            # optional deps fail to reify (sharp, swc, oxide, resolver-binding etc).
            # We ignore npm's exit code and verify node_modules state instead.
            npm ci --no-audit --no-fund || NPM_EXIT=$?
            if [ ! -d node_modules/next ] || [ ! -d node_modules/react ] || [ ! -d node_modules/sharp ] || [ ! -d node_modules/@next/swc-linux-x64-gnu ]; then
              echo "FATAL: node_modules incomplete after npm ci (next/react/sharp/swc-linux-x64-gnu missing)"
              exit 1
            fi
            if [ -n "$NPM_EXIT" ]; then
              echo "Note: npm ci exited $NPM_EXIT but critical packages verified intact — npm 10.8.2 reify exit code bug, continuing"
            fi

            # Two-slot atomic build: build into inactive slot, swap symlink, restart
            # First-time migration: convert .next directory into slot .next-a + symlink
            if [ -d ".next" ] && [ ! -L ".next" ]; then
              echo "Migrating .next/ to two-slot setup..."
              mv .next .next-a
              ln -sfn .next-a .next
            fi

            # Determine which slot is currently active, build into the other
            CURRENT_SLOT=$(readlink .next 2>/dev/null || echo "none")
            if [ "$CURRENT_SLOT" = ".next-a" ]; then
              NEXT_SLOT=".next-b"
            else
              NEXT_SLOT=".next-a"
            fi
            echo "Active slot: $CURRENT_SLOT → building into: $NEXT_SLOT"

            # Clean inactive slot and build into it (server keeps reading active slot)
            rm -rf "$NEXT_SLOT"
            NEXT_DIST_DIR="$NEXT_SLOT" npm run build

            # Atomic symlink swap + short restart (~5-10s downtime)
            ln -sfn "$NEXT_SLOT" .next
            pm2 restart jckauto
            pm2 delete jckauto-bot || true
            pm2 start "npx tsx -r dotenv/config scripts/start-bot.ts dotenv_config_path=.env.local" --name jckauto-bot
            pm2 save
            pm2 status
